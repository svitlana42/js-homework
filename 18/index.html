<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <!-- 1 -->
    <h2>Оберіть улюблений колір</h2>
    <form action="">
        <div>
            <input type="radio" name="color" value="red">
            Червоний
        </div>
        <div>
            <input type="radio" name="color" value="green">
            Зелений
        </div>
        <div>
            <input type="radio" name="color" value="blue">
            Синій
        </div>
    </form>
    <!-- 2 -->
    <h2>Оберіть хобі</h2>
    <div>
        <label for="reading">
            <input type="checkbox" id="reading" value="читання">
            Читання
        </label>
    </div>

    <div>
        <label for="sport">
            <input type="checkbox" id="sport" value="спорт">
            Спорт
        </label>
    </div>

    <div>
        <label for="music">
            <input type="checkbox" id="music" value="музика">
            Музика
        </label>
    </div>
    <p class="result"></p>
    <!-- 3 -->
    <h2>Оберіть країну</h2>
    <select id="country">
        <option value="">Країни</option>
        <option value="ukraine">Україна</option>
        <option value="germany">Німеччина</option>
        <option value="england">Англія</option>
    </select>
    <p class="info"></p>
    <!-- 4 -->
    <h2>Оцініть якість обслуговування</h2>
    <form action="">
        <div>
            <input type="radio" name="rating" value="1">
            1
        </div>
        <div>
            <input type="radio" name="rating" value="2">
            2
        </div>
        <div>
            <input type="radio" name="rating" value="3">
            3
        </div>
        <div>
            <input type="radio" name="rating" value="4">
            4
        </div>
        <div>
            <input type="radio" name="rating" value="5">
            5
        </div>
        <p class="rate"></p>
    </form>
    <!-- 5 -->
    <h2>Замовлення піци</h2>
    <p>Оберіть піцу:</p>
    <select id="pizza">
        <option value=""></option>
        <option value="100">Маргарита</option>
        <option value="120">Пепероні</option>
        <option value="145">4 Сири</option>
    </select>
    <p>Оберіть розмір:</p>
    <label for="">
        <input type="radio" name="size" value="0">
        Мала
    </label>
    <label for="">
        <input type="radio" name="size" value="50">
        Середня
    </label>
    <label for="">
        <input type="radio" name="size" value="100">
        Велика
    </label>
    <p>Додаткові начинку:</p>
    <label for="">
        <input type="checkbox" class="topping">
        Сир
    </label>
    <label for="">
        <input type="checkbox" class="topping">
        Гриби
    </label>
    <label for="">
        <input type="checkbox" class="topping">
        Ананас
    </label>
    <p class="price">Ціна: 0 грн.</p>

    <script src="form.js"></script>
</body>

</html>
